{% extends "base.html" %}
{% block content %}
<h1><i class="fas fa-user-plus"></i> Add Student</h1>
<div class="auth-wrapper" style="min-height: auto;">
    <div class="auth-card">
        <form method="POST" class="auth-form">
            <div class="input-group">
                <i class="fas fa-id-badge input-icon"></i>
                <input type="text" name="roll_no" placeholder="Enter roll number" required class="auth-input">
            </div>
            <div class="input-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="name" placeholder="Enter student name" required class="auth-input">
            </div>
            <div class="input-group">
                <i class="fas fa-calendar-alt input-icon"></i>
                <select name="admission_year" required class="auth-input" style="padding-left: 3.5rem;">
                    {% for y in admission_years %}
                        <option value="{{ y }}">{{ y }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="input-group">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" name="email" placeholder="Enter student email (optional)" class="auth-input">
            </div>
            <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px; margin-top: 1rem;">
                <h4 style="color: #06b6d4; margin-bottom: 0.5rem;"><i class="fas fa-info-circle"></i> Auto-Generated Class</h4>
                <p style="font-size: 0.9rem; color: #94a3b8;">The class name (e.g., 26FYBSC) will be automatically generated based on admission year and current academic year.</p>
            </div>
            <button type="submit" class="auth-btn primary-btn"><i class="fas fa-check-circle"></i> Add Student</button>
        </form>
    </div>
</div>
{% endblock %}
