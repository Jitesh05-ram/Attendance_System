{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Sign up to get started</p>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="input-group">
                <i class="fas fa-user input-icon"></i>
                <input 
                    type="text" 
                    name="name" 
                    placeholder="Your full name" 
                    required 
                    autocomplete="name"
                    class="auth-input"
                >
            </div>
            
            <div class="input-group">
                <i class="fas fa-envelope input-icon"></i>
                <input 
                    type="email" 
                    name="email" 
                    placeholder="Enter your email" 
                    required 
                    autocomplete="email"
                    class="auth-input"
                >
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input 
                    type="password" 
                    name="password" 
                    id="registerPassword"
                    placeholder="Create a password" 
                    required 
                    autocomplete="new-password"
                    class="auth-input"
                    minlength="8"
                >
                <button type="button" class="toggle-password" id="toggleRegisterPassword" aria-label="Toggle password visibility">
                    <i class="fas fa-eye" id="registerPasswordIcon"></i>
                </button>
            </div>
            
            <div class="input-group">
                <i class="fas fa-check-double input-icon"></i>
                <input 
                    type="password" 
                    name="confirm_password" 
                    id="confirmRegisterPassword"
                    placeholder="Confirm your password" 
                    required 
                    autocomplete="new-password"
                    class="auth-input"
                    minlength="8"
                >
                <button type="button" class="toggle-password" id="toggleConfirmPassword" aria-label="Toggle password visibility">
                    <i class="fas fa-eye" id="confirmPasswordIcon"></i>
                </button>
            </div>
            
            <div class="password-hints">
                <p class="hints-title">Password must contain:</p>
                <ul class="hints-list">
                    <li class="hint-item">
                        <i class="fas fa-circle hint-icon"></i> At least 8 characters
                    </li>
                    <li class="hint-item">
                        <i class="fas fa-circle hint-icon"></i> Uppercase & lowercase letters
                    </li>
                    <li class="hint-item">
                        <i class="fas fa-circle hint-icon"></i> At least one number
                    </li>
                    <li class="hint-item">
                        <i class="fas fa-circle hint-icon"></i> One special character (!@#$%^&*)
                    </li>
                </ul>
            </div>
            
            <button type="submit" class="auth-btn primary-btn">
                <i class="fas fa-user-plus"></i> Sign Up
            </button>
        </form>
        
        <div class="auth-links" style="justify-content: center;">
            <a href="{{ url_for('login') }}" class="link">Already have an account? Sign in</a>
        </div>
    </div>
</div>

<style>
.auth-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 100px);
    padding: clamp(16px, 4vw, 24px);
}

.auth-card {
    background: linear-gradient(145deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.98));
    backdrop-filter: blur(20px);
    border-radius: clamp(20px, 5vw, 24px);
    border: 1px solid rgba(100, 255, 218, 0.3);
    box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.6),
        0 0 80px rgba(100, 255, 218, 0.08);
    padding: clamp(28px, 6vw, 40px) clamp(24px, 5vw, 35px);
    width: 100%;
    max-width: 420px;
    animation: fadeInUp 0.7s ease-out;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.auth-logo {
    text-align: center;
    margin-bottom: clamp(28px, 6vw, 35px);
}

.logo-icon {
    width: clamp(70px, 16vw, 90px);
    height: clamp(70px, 16vw, 90px);
    margin: 0 auto clamp(16px, 4vw, 20px);
    background: linear-gradient(135deg, #64ffda 0%, #22d3ee 100%);
    border-radius: clamp(18px, 4vw, 24px);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 30px rgba(100, 255, 218, 0.4);
}

.logo-icon i {
    font-size: clamp(32px, 7vw, 40px);
    color: #0f172a;
}

.auth-title {
    color: #64ffda;
    font-size: clamp(20px, 4.5vw, 26px);
    margin: 0 0 clamp(8px, 2vw, 10px) 0;
    text-shadow: 0 0 15px rgba(100, 255, 218, 0.4);
}

.auth-subtitle {
    color: #94a3b8;
    font-size: clamp(13px, 2.8vw, 15px);
    margin: 0;
}

.auth-form {
    display: flex;
    flex-direction: column;
    gap: clamp(18px, 4vw, 24px);
    margin-bottom: clamp(20px, 4vw, 28px);
}

.password-hints {
    background: rgba(15, 23, 42, 0.6);
    border-radius: clamp(10px, 2.5vw, 14px);
    padding: clamp(14px, 3.5vw, 18px);
    border: 1px solid rgba(148, 163, 184, 0.2);
}

.hints-title {
    color: #94a3b8;
    font-size: clamp(13px, 2.8vw, 14px);
    margin: 0 0 clamp(8px, 2vw, 12px) 0;
}

.hints-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.hint-item {
    color: #cbd5e1;
    font-size: clamp(12px, 2.6vw, 14px);
    display: flex;
    align-items: center;
    gap: clamp(8px, 2vw, 12px);
    padding: clamp(4px, 1vw, 8px) 0;
}

.hint-icon {
    font-size: clamp(5px, 1.5vw, 7px);
    color: #64ffda;
}

.auth-btn {
    position: relative;
    padding: clamp(14px, 3vw, 18px) clamp(20px, 4vw, 24px);
    border: none;
    border-radius: clamp(14px, 3.5vw, 16px);
    font-size: clamp(15px, 3vw, 16px);
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(8px, 2vw, 12px);
    width: 100%;
}

.primary-btn {
    background: linear-gradient(135deg, #64ffda 0%, #22d3ee 100%);
    color: #0f172a;
    box-shadow: 0 6px 25px rgba(100, 255, 218, 0.4);
}

.primary-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 35px rgba(100, 255, 218, 0.5);
}

.auth-links {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: clamp(10px, 2.5vw, 14px);
}

.link {
    color: #94a3b8;
    text-decoration: none;
    font-size: clamp(13px, 2.8vw, 14px);
    transition: all 0.2s ease;
}

.link:hover {
    color: #64ffda;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const toggleRegisterPassword = document.getElementById('toggleRegisterPassword');
    const registerPasswordInput = document.getElementById('registerPassword');
    const registerPasswordIcon = document.getElementById('registerPasswordIcon');

    toggleRegisterPassword.addEventListener('click', function() {
        const type = registerPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        registerPasswordInput.setAttribute('type', type);
        registerPasswordIcon.classList.toggle('fa-eye');
        registerPasswordIcon.classList.toggle('fa-eye-slash');
    });

    const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
    const confirmPasswordInput = document.getElementById('confirmRegisterPassword');
    const confirmPasswordIcon = document.getElementById('confirmPasswordIcon');

    toggleConfirmPassword.addEventListener('click', function() {
        const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        confirmPasswordInput.setAttribute('type', type);
        confirmPasswordIcon.classList.toggle('fa-eye');
        confirmPasswordIcon.classList.toggle('fa-eye-slash');
    });
});
</script>
{% endblock %}
