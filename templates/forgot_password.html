{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">
                <i class="fas fa-key"></i>
            </div>
            <h1 class="auth-title">Forgot Password?</h1>
            <p class="auth-subtitle">We'll send you a temporary password</p>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="input-group">
                <i class="fas fa-envelope input-icon"></i>
                <input 
                    type="email" 
                    name="email" 
                    placeholder="Enter your email" 
                    required 
                    autocomplete="email"
                    class="auth-input"
                >
            </div>
            
            <button type="submit" class="auth-btn primary-btn">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>
        </form>
        
        {% if temp_password %}
        <div style="background: rgba(250, 204, 21, 0.1); border: 1px solid rgba(250, 204, 21, 0.3); border-radius: 16px; padding: 20px; text-align: center; margin-top: 20px;">
            <h3 style="color: #facc15; margin: 0 0 10px 0;"><i class="fas fa-key"></i> Your Temporary Password</h3>
            <p style="color: #e2e8f0; font-size: 14px; margin: 0 0 15px 0;">Please save this password and login immediately!</p>
            <div style="background: #0f172a; border: 2px solid rgba(100, 255, 218, 0.3); border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
                <span id="temp-password" style="font-family: monospace; font-size: 18px; color: #64ffda; letter-spacing: 2px;">{{ temp_password }}</span>
                <button onclick="copyPassword()" class="btn" style="padding: 8px 15px; font-size: 14px;">
                    <i class="fas fa-copy"></i> Copy
                </button>
            </div>
        </div>
        <script>
            function copyPassword() {
                const passwordText = document.getElementById('temp-password').innerText;
                navigator.clipboard.writeText(passwordText).then(() => {
                    alert('Password copied to clipboard!');
                }).catch(() => {
                    alert('Failed to copy password. Please copy manually.');
                });
            }
        </script>
        {% endif %}
        
        <div class="auth-links" style="justify-content: center;">
            <a href="{{ url_for('login') }}" class="link">Back to Sign In</a>
        </div>
    </div>
</div>

<style>
.auth-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 100px);
    padding: clamp(16px, 4vw, 24px);
}

.auth-card {
    background: linear-gradient(145deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.98));
    backdrop-filter: blur(20px);
    border-radius: clamp(20px, 5vw, 24px);
    border: 1px solid rgba(100, 255, 218, 0.3);
    box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.6),
        0 0 80px rgba(100, 255, 218, 0.08);
    padding: clamp(28px, 6vw, 40px) clamp(24px, 5vw, 35px);
    width: 100%;
    max-width: 420px;
    animation: fadeInUp 0.7s ease-out;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.auth-logo {
    text-align: center;
    margin-bottom: clamp(28px, 6vw, 35px);
}

.logo-icon {
    width: clamp(70px, 16vw, 90px);
    height: clamp(70px, 16vw, 90px);
    margin: 0 auto clamp(16px, 4vw, 20px);
    background: linear-gradient(135deg, #64ffda 0%, #22d3ee 100%);
    border-radius: clamp(18px, 4vw, 24px);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 30px rgba(100, 255, 218, 0.4);
}

.logo-icon i {
    font-size: clamp(32px, 7vw, 40px);
    color: #0f172a;
}

.auth-title {
    color: #64ffda;
    font-size: clamp(20px, 4.5vw, 26px);
    margin: 0 0 clamp(8px, 2vw, 10px) 0;
    text-shadow: 0 0 15px rgba(100, 255, 218, 0.4);
}

.auth-subtitle {
    color: #94a3b8;
    font-size: clamp(13px, 2.8vw, 15px);
    margin: 0;
}

.auth-form {
    display: flex;
    flex-direction: column;
    gap: clamp(18px, 4vw, 24px);
    margin-bottom: clamp(20px, 4vw, 28px);
}

.auth-btn {
    position: relative;
    padding: clamp(14px, 3vw, 18px) clamp(20px, 4vw, 24px);
    border: none;
    border-radius: clamp(14px, 3.5vw, 16px);
    font-size: clamp(15px, 3vw, 16px);
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(8px, 2vw, 12px);
    width: 100%;
}

.primary-btn {
    background: linear-gradient(135deg, #64ffda 0%, #22d3ee 100%);
    color: #0f172a;
    box-shadow: 0 6px 25px rgba(100, 255, 218, 0.4);
}

.primary-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 35px rgba(100, 255, 218, 0.5);
}

.auth-links {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: clamp(10px, 2.5vw, 14px);
}

.link {
    color: #94a3b8;
    text-decoration: none;
    font-size: clamp(13px, 2.8vw, 14px);
    transition: all 0.2s ease;
}

.link:hover {
    color: #64ffda;
}
</style>
{% endblock %}
