{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">
                <i class="fas fa-clipboard-check"></i>
            </div>
            <h1 class="auth-title">Attendance System</h1>
            <p class="auth-subtitle">Sign in to continue</p>
        </div>
        
        <form method="POST" class="auth-form" id="loginForm">
            <div class="input-group">
                <i class="fas fa-envelope input-icon"></i>
                <input 
                    type="email" 
                    name="email" 
                    placeholder="Enter your email" 
                    required 
                    autocomplete="email"
                    class="auth-input"
                >
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input 
                    type="password" 
                    name="password" 
                    id="passwordInput"
                    placeholder="Enter your password" 
                    required 
                    autocomplete="current-password"
                    class="auth-input"
                >
                <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                    <i class="fas fa-eye" id="passwordIcon"></i>
                </button>
            </div>
            
            <button type="submit" class="auth-btn primary-btn" id="loginBtn">
                <span class="btn-text">Sign In</span>
                <div class="btn-loader hidden">
                    <div class="spinner"></div>
                </div>
            </button>
        </form>
        
        <div class="auth-links">
            <a href="{{ url_for('forgot_password') }}" class="link">Forgot your password?</a>
            <a href="{{ url_for('register') }}" class="link">Create new account</a>
        </div>
    </div>
</div>

<style>
.auth-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 100px);
    padding: clamp(16px, 4vw, 24px);
}

.auth-card {
    background: linear-gradient(145deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.98));
    backdrop-filter: blur(20px);
    border-radius: clamp(20px, 5vw, 24px);
    border: 1px solid rgba(100, 255, 218, 0.3);
    box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.6),
        0 0 80px rgba(100, 255, 218, 0.08);
    padding: clamp(28px, 6vw, 40px) clamp(24px, 5vw, 35px);
    width: 100%;
    max-width: 420px;
    animation: fadeInUp 0.7s ease-out;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.auth-logo {
    text-align: center;
    margin-bottom: clamp(28px, 6vw, 35px);
}

.logo-icon {
    width: clamp(70px, 16vw, 90px);
    height: clamp(70px, 16vw, 90px);
    margin: 0 auto clamp(16px, 4vw, 20px);
    background: linear-gradient(135deg, #64ffda 0%, #22d3ee 100%);
    border-radius: clamp(18px, 4vw, 24px);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 30px rgba(100, 255, 218, 0.4);
    animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% {
        box-shadow: 0 8px 30px rgba(100, 255, 218, 0.4);
    }
    50% {
        box-shadow: 0 12px 40px rgba(100, 255, 218, 0.6);
    }
}

.logo-icon i {
    font-size: clamp(32px, 7vw, 40px);
    color: #0f172a;
}

.auth-title {
    color: #64ffda;
    font-size: clamp(20px, 4.5vw, 26px);
    margin: 0 0 clamp(8px, 2vw, 10px) 0;
    text-shadow: 0 0 15px rgba(100, 255, 218, 0.4);
}

.auth-subtitle {
    color: #94a3b8;
    font-size: clamp(13px, 2.8vw, 15px);
    margin: 0;
}

.auth-form {
    display: flex;
    flex-direction: column;
    gap: clamp(18px, 4vw, 24px);
    margin-bottom: clamp(20px, 4vw, 28px);
}

.auth-btn {
    position: relative;
    padding: clamp(14px, 3vw, 18px) clamp(20px, 4vw, 24px);
    border: none;
    border-radius: clamp(14px, 3.5vw, 16px);
    font-size: clamp(15px, 3vw, 16px);
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(8px, 2vw, 12px);
    width: 100%;
}

.primary-btn {
    background: linear-gradient(135deg, #64ffda 0%, #22d3ee 100%);
    color: #0f172a;
    box-shadow: 0 6px 25px rgba(100, 255, 218, 0.4);
}

.primary-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 35px rgba(100, 255, 218, 0.5);
}

.google-btn {
    background: rgba(30, 41, 59, 0.95);
    color: #e2e8f0;
    border: 2px solid rgba(148, 163, 184, 0.3);
}

.google-btn:hover {
    background: rgba(51, 65, 85, 0.95);
    border-color: #64ffda;
    transform: translateY(-2px);
}

.google-icon {
    width: clamp(18px, 4vw, 22px);
    height: clamp(18px, 4vw, 22px);
}

.btn-loader {
    display: flex;
}

.hidden {
    display: none;
}

.spinner {
    width: clamp(18px, 4vw, 22px);
    height: clamp(18px, 4vw, 22px);
    border: 3px solid rgba(15, 23, 42, 0.3);
    border-top-color: #0f172a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.divider {
    display: flex;
    align-items: center;
    margin: clamp(20px, 4vw, 26px) 0;
}

.divider::before,
.divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: rgba(148, 163, 184, 0.2);
}

.divider-text {
    color: #94a3b8;
    font-size: clamp(13px, 2.8vw, 14px);
    padding: 0 clamp(14px, 3vw, 18px);
}

.auth-links {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: clamp(10px, 2.5vw, 14px);
    margin-top: clamp(16px, 4vw, 22px);
}

.link {
    color: #94a3b8;
    text-decoration: none;
    font-size: clamp(13px, 2.8vw, 14px);
    transition: all 0.2s ease;
}

.link:hover {
    color: #64ffda;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('passwordInput');
    const passwordIcon = document.getElementById('passwordIcon');

    togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        passwordIcon.classList.toggle('fa-eye');
        passwordIcon.classList.toggle('fa-eye-slash');
    });

    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const btnText = loginBtn.querySelector('.btn-text');
    const btnLoader = loginBtn.querySelector('.btn-loader');

    loginForm.addEventListener('submit', function(e) {
        loginBtn.disabled = true;
        btnText.style.display = 'none';
        btnLoader.classList.remove('hidden');
    });
});
</script>
{% endblock %}
