{% extends "base.html" %}
{% block content %}
<h1><i class="fas fa-tags"></i> Categories (Course Abbreviations)</h1>
<a href="{{ url_for('add_category') }}" class="btn"><i class="fas fa-plus-circle"></i> Add Category</a>

<div class="table-wrapper" style="margin-top: 1.5rem;">
    <table>
        <thead>
            <tr>
                <th><i class="fas fa-code"></i> Code</th>
                <th><i class="fas fa-book"></i> Name (Optional)</th>
                <th><i class="fas fa-cog"></i> Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for category in categories %}
            <tr>
                <td>{{ category.code }}</td>
                <td>{{ category.name or '-' }}</td>
                <td>
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                        <a href="{{ url_for('edit_category', category_id=category.id) }}" class="btn" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); padding: 0.3rem 0.8rem; font-size: 0.85rem;">
                            <i class="fas fa-edit"></i> Edit
                        </a>
                        <form method="POST" action="{{ url_for('delete_category', category_id=category.id) }}" style="display: inline;">
                            <button type="submit" onclick="return confirm('Are you sure you want to delete this category? Subjects in this category will be uncategorized.');" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); padding: 0.3rem 0.8rem; font-size: 0.85rem;">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" style="text-align: center; color: #94a3b8; padding: 2rem;">No categories yet. Add your first one!</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
