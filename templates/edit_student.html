{% extends "base.html" %}
{% block content %}
<h1><i class="fas fa-edit"></i> Edit Student</h1>
<form method="POST">
    <div>
        <label><i class="fas fa-id-badge"></i> Roll No:</label>
        <input type="text" name="roll_no" value="{{ student.roll_no }}" required>
    </div>
    <div>
        <label><i class="fas fa-user"></i> Name:</label>
        <input type="text" name="name" value="{{ student.name }}" required>
    </div>
    <div>
        <label><i class="fas fa-envelope"></i> Email (optional):</label>
        <input type="email" name="email" value="{{ student.email or '' }}" placeholder="Enter student email">
    </div>
    <div>
        <label><i class="fas fa-door-open"></i> Class:</label>
        <input type="text" name="class_name" value="{{ student.class_name }}" required>
    </div>
    <div>
        <label><i class="fas fa-graduation-cap"></i> Year:</label>
        <select name="year" required>
            {% for y in years %}
                <option value="{{ y }}" {% if student.year == y %}selected{% endif %}>{{ y }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit"><i class="fas fa-save"></i> Update Student</button>
</form>
{% endblock %}
